openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Enerji Yönetim Sistemi API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: targets
    description: Enerji hedefleri ve EnPI takibi
  - name: action-plans
    description: Eylem planları
  - name: target-progress
    description: Hedef gerçekleşme kayıtları
  - name: vap-projects
    description: Verimlilik Artırıcı Projeler (VAP)
  - name: units
    description: Birim yönetimi
  - name: meters
    description: Sayaç yönetimi
  - name: consumption
    description: Enerji tüketim verileri
  - name: weather
    description: Meteoroloji verileri (HDD/CDD)
  - name: analysis
    description: Regresyon ve performans analizi
  - name: swot
    description: SWOT analizi
  - name: risks
    description: Risk ve fırsat analizi
  - name: seu
    description: Önemli enerji kullanımları (ÖEK/SEU)
  - name: reports
    description: Raporlar
  - name: dashboard
    description: Dashboard özet verileri
  - name: summary
    description: Çok birimli özet
  - name: ai
    description: Yapay zeka önerileri

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── UNITS ────────────────────────────────────────────────
  /units:
    get:
      operationId: listUnits
      tags: [units]
      summary: Tüm birimleri listele
      parameters:
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Unit"
    post:
      operationId: createUnit
      tags: [units]
      summary: Yeni birim ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"

  /units/{id}:
    get:
      operationId: getUnit
      tags: [units]
      summary: Birim detayı
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
    patch:
      operationId: updateUnit
      tags: [units]
      summary: Birim güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
    delete:
      operationId: deleteUnit
      tags: [units]
      summary: Birim sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── METERS ──────────────────────────────────────────────
  /meters:
    get:
      operationId: listMeters
      tags: [meters]
      summary: Tüm sayaçları listele
      parameters:
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meter"
    post:
      operationId: createMeter
      tags: [meters]
      summary: Yeni sayaç ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"

  /meters/{id}:
    get:
      operationId: getMeter
      tags: [meters]
      summary: Sayaç detayı
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"
    patch:
      operationId: updateMeter
      tags: [meters]
      summary: Sayaç güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeterUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"
    delete:
      operationId: deleteMeter
      tags: [meters]
      summary: Sayaç sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CONSUMPTION ──────────────────────────────────────────
  /consumption:
    get:
      operationId: listConsumption
      tags: [consumption]
      summary: Tüketim verileri listesi
      parameters:
        - name: meterId
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsumptionRecord"
    post:
      operationId: createConsumption
      tags: [consumption]
      summary: Tüketim verisi ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionRecord"

  /consumption/{id}:
    patch:
      operationId: updateConsumption
      tags: [consumption]
      summary: Tüketim verisi güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumptionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionRecord"
    delete:
      operationId: deleteConsumption
      tags: [consumption]
      summary: Tüketim verisi sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── WEATHER ─────────────────────────────────────────────
  /weather:
    get:
      operationId: listWeather
      tags: [weather]
      summary: HDD/CDD verileri listesi
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherRecord"
    post:
      operationId: fetchWeatherData
      tags: [weather]
      summary: Meteoroloji API'sinden HDD/CDD çek
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherFetchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherRecord"

  # ── ANALYSIS ─────────────────────────────────────────────
  /analysis/regression:
    get:
      operationId: getRegressionAnalysis
      tags: [analysis]
      summary: Regresyon analizi (EnPG, EnRÇ, EEI hesapla)
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: meterId
          in: query
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegressionResult"

  /analysis/performance:
    get:
      operationId: getPerformanceIndicators
      tags: [analysis]
      summary: Enerji performans göstergeleri özeti
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceIndicators"

  # ── SWOT ──────────────────────────────────────────────────
  /swot:
    get:
      operationId: listSwotItems
      tags: [swot]
      summary: SWOT maddeleri listesi
      parameters:
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SwotItem"
    post:
      operationId: createSwotItem
      tags: [swot]
      summary: SWOT maddesi ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwotItem"

  /swot/{id}:
    patch:
      operationId: updateSwotItem
      tags: [swot]
      summary: SWOT maddesi güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwotUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwotItem"
    delete:
      operationId: deleteSwotItem
      tags: [swot]
      summary: SWOT maddesi sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── TARGETS ───────────────────────────────────────────────
  /targets:
    get:
      operationId: listTargets
      tags: [targets]
      summary: Enerji hedeflerini listele (ilerleme dahil)
      parameters:
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergyTargetWithProgress"
    post:
      operationId: createTarget
      tags: [targets]
      summary: Enerji hedefi ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyTargetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyTarget"

  /targets/{id}:
    patch:
      operationId: updateTarget
      tags: [targets]
      summary: Enerji hedefini güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyTargetUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyTarget"
    delete:
      operationId: deleteTarget
      tags: [targets]
      summary: Enerji hedefini sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ENERGY ACTION PLANS ───────────────────────────────────
  /energy-action-plans:
    get:
      operationId: listEnergyActionPlans
      tags: [action-plans]
      summary: Eylem planlarını listele
      parameters:
        - name: targetId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergyActionPlan"
    post:
      operationId: createEnergyActionPlan
      tags: [action-plans]
      summary: Eylem planı ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyActionPlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyActionPlan"

  /energy-action-plans/{id}:
    put:
      operationId: updateEnergyActionPlan
      tags: [action-plans]
      summary: Eylem planı güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyActionPlanUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyActionPlan"
    delete:
      operationId: deleteEnergyActionPlan
      tags: [action-plans]
      summary: Eylem planı sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ENERGY TARGET PROGRESS ────────────────────────────────
  /energy-target-progress:
    get:
      operationId: listEnergyTargetProgress
      tags: [target-progress]
      summary: Hedef gerçekleşme kayıtlarını listele
      parameters:
        - name: targetId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergyTargetProgressRecord"
    post:
      operationId: createEnergyTargetProgress
      tags: [target-progress]
      summary: Gerçekleşme kaydı ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyTargetProgressInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyTargetProgressRecord"

  /energy-target-progress/{id}:
    delete:
      operationId: deleteEnergyTargetProgress
      tags: [target-progress]
      summary: Gerçekleşme kaydını sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── VAP PROJECTS ──────────────────────────────────────────
  /vap-projects:
    get:
      operationId: listVapProjects
      tags: [vap-projects]
      summary: VAP projelerini listele
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VapProject"
    post:
      operationId: createVapProject
      tags: [vap-projects]
      summary: VAP projesi oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VapProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapProject"

  /vap-projects/{id}:
    put:
      operationId: updateVapProject
      tags: [vap-projects]
      summary: VAP projesi güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VapProjectUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapProject"
    delete:
      operationId: deleteVapProject
      tags: [vap-projects]
      summary: VAP projesi sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── RISKS ─────────────────────────────────────────────────
  /risks:
    get:
      operationId: listRisks
      tags: [risks]
      summary: Risk ve fırsatlar listesi
      parameters:
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskItem"
    post:
      operationId: createRisk
      tags: [risks]
      summary: Risk/Fırsat ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskItem"

  /risks/{id}:
    patch:
      operationId: updateRisk
      tags: [risks]
      summary: Risk/Fırsat güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskItem"
    delete:
      operationId: deleteRisk
      tags: [risks]
      summary: Risk/Fırsat sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /risks/{id}/notes:
    post:
      operationId: addRiskNote
      tags: [risks]
      summary: Gerçekleşme notu ekle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskNote"

  /risks/{id}/notes/{noteId}:
    patch:
      operationId: updateRiskNote
      tags: [risks]
      summary: Gerçekleşme notunu düzenle (yönetici)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskNote"
    delete:
      operationId: deleteRiskNote
      tags: [risks]
      summary: Gerçekleşme notunu sil (yönetici)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── SEU / ÖEK ────────────────────────────────────────────
  /seu:
    get:
      operationId: listSeu
      tags: [seu]
      summary: Önemli enerji kullanımları listesi
      parameters:
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeuItem"
    post:
      operationId: createSeu
      tags: [seu]
      summary: ÖEK ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeuInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeuItem"

  /seu/{id}:
    patch:
      operationId: updateSeu
      tags: [seu]
      summary: ÖEK güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeuUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeuItem"
    delete:
      operationId: deleteSeu
      tags: [seu]
      summary: ÖEK sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DASHBOARD ─────────────────────────────────────────────
  /dashboard/kpi:
    get:
      operationId: getDashboardKpi
      tags: [dashboard]
      summary: KPI özet verileri (Toplam Enerji, CO₂, TEP)
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpi"

  /dashboard/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [dashboard]
      summary: Aylık enerji tüketim trendi
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendPoint"

  /dashboard/seu-breakdown:
    get:
      operationId: getSeuBreakdown
      tags: [dashboard]
      summary: ÖEK bazında enerji dağılımı
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeuBreakdownPoint"

  # ── SUMMARY ───────────────────────────────────────────────
  /summary:
    get:
      operationId: getSummary
      tags: [summary]
      summary: Tüm birimler için özet ve karşılaştırma
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResult"

  # ── AI ────────────────────────────────────────────────────
  /ai/suggestions:
    post:
      operationId: getAiSuggestions
      tags: [ai]
      summary: Yapay zeka enerji iyileştirme önerileri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSuggestionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestionResponse"

  # ── REPORTS ───────────────────────────────────────────────
  /reports/generate:
    post:
      operationId: generateReport
      tags: [reports]
      summary: Yıllık enerji performans raporu oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResult"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: Oluşturulan raporlar listesi
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportRecord"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: Tüm firmaları listele (sadece superadmin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Yeni firma oluştur (sadece superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Firma güncelle (sadece superadmin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Firma sil (sadece superadmin, id=1 silinemez)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

